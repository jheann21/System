{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Online Voting System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgba(6,12,34,0.85), rgba(6,12,34,0.85)),
                        url("{% static 'bg.jpg' %}") no-repeat center center/cover;
            color: white;
        }

        .overlay {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .login-box {
            width: 400px;
            padding: 45px;
            border-radius: 15px;
            background: rgba(0, 150, 136, 0.08);
            border: 1px solid rgba(0, 150, 136, 0.4);
            box-shadow: 0 0 40px rgba(0, 150, 136, 0.4);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .icon {
            font-size: 65px;
            margin-bottom: 10px;
            color: #00e5c0;
            text-shadow: 0 0 25px #00e5c0;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 1px solid rgba(0, 229, 192, 0.5);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            outline: none;
            font-size: 15px;
        }

        input::placeholder {
            color: #b0bec5;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            font-size: 18px;
            background: #00e5c0;
            color: #062022;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px #00e5c0;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .signup {
            margin-top: 15px;
            font-size: 14px;
            color: #cfd8dc;
        }

        .signup a {
            color: #00e5c0;
            text-decoration: none;
            font-weight: bold;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #90a4ae;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="login-box">
        <div class="icon">🔐</div>
        <h2>LOGIN</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required>

            <!-- EMAIL OR PHONE -->
            <input type="text" name="contact" placeholder="Email or Phone Number" required>

            <!-- PIN / UNIQUE CODE -->
            <input type="text" name="pin_code" placeholder="PIN / Unique Code" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="btn">Login</button>
        </form>

        <div class="signup">
            Don’t have an account?
            <a href="{% url 'register' %}">Create Account</a>
        </div>

    </div>

    <div class="footer">
        Secure Access © 2026 Online Voting System
    </div>

</div>

</body>
</html>
